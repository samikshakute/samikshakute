name: "📚 Blog Updater"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight

jobs:
  update_blogs:
    name: "Update Blogs"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Fetching Repository Contents"
        uses: actions/checkout@v2  # Use a stable version

      - name: "📚 Hashnode Updater"
        uses: "varunsridharan/action-hashnode-blog@main"
        with:
          USERNAME: 'samikshakute' # Replace with your Hashnode username
          BLOG_URL: 'https://samikshakute.hashnode.dev' # Replace with your actual Hashnode blog URL
          COUNT: 1 # Max number of visible blog posts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

